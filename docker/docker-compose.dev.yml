# Development configuration - No external services included
# Uses external PostgreSQL and Redis installations

version: '3.8'

services:
  # Development API service (optional - for containerized development)
  api-dev:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    container_name: data-lens-api-dev
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:password@host.docker.internal:5432/data_lens}
      - REDIS_URL=${REDIS_URL:-redis://host.docker.internal:6379}
      - DEBUG=true
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    ports:
      - "8000:8000"
    volumes:
      - ../apps/api:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    extra_hosts:
      - "host.docker.internal:host-gateway"
    profiles:
      - api-only

  # Development Web service (optional - for containerized development) 
  web-dev:
    build:
      context: ../apps/web
      dockerfile: Dockerfile.dev
    container_name: data-lens-web-dev
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000/ws
    ports:
      - "3000:3000"
    volumes:
      - ../apps/web:/app
      - /app/node_modules
    command: npm run dev
    profiles:
      - web-only

networks:
  default:
    name: data-lens-network